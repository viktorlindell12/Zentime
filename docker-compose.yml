services:
  postgres:
    image: postgres:16-alpine
    container_name: zentime-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-zentime}
      POSTGRES_USER: ${DB_USER:-zentime}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zentime}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zentime} -d ${DB_NAME:-zentime}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: zentime-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@zentime.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: